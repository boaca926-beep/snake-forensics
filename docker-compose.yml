services:
  snake-game:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
      - ENABLE_DEBUG=${ENABLE_DEBUG}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - .:/app
      - /app/__pycache__
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/machine-id:/etc/machine-id:ro
    network_mode: host
    stdin_open: true
    tty: true